version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies]
    groups:
      otel:
        patterns: ["OpenTelemetry*"]
      ef:
        patterns: ["Microsoft.EntityFrameworkCore*", "Npgsql*"]
      test:
        patterns: ["xunit*", "Testcontainers*"]
    ignore:
      # FluentAssertions 8.x adopted a commercial license. Hold majors
      # until you decide whether to pay, switch (e.g.
      # AwesomeAssertions), or stay on 6.x.
      - dependency-name: "FluentAssertions"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    groups:
      actions-core:
        patterns: ["actions/*", "github/*"]
      actions-third-party:
        patterns: ["*"]
        exclude-patterns: ["actions/*", "github/*"]
