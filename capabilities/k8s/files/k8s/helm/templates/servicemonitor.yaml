{{- if .Values.otel.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{name}}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{name}}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
