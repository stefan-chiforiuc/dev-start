name: Bug report
description: Something in dev-start is broken.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before you continue,
        please run `dev-start doctor` and paste the output below.
  - type: input
    id: version
    attributes:
      label: dev-start version
      description: "Run `dev-start --version` to find out."
      placeholder: "e.g. 1.0.0-alpha"
    validations:
      required: true
  - type: input
    id: dotnet
    attributes:
      label: .NET SDK version
      placeholder: "e.g. 8.0.404"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 14.5, Ubuntu 22.04, Windows 11"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps that trigger the bug.
      placeholder: |
        1. dev-start new foo
        2. cd foo && just up
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`dev-start doctor` output"
      render: shell
