name: Trivy

on:
  push:
    branches: [main]
  schedule:
    - cron: "23 4 * * 2"
  # Pull-request Trivy has to be manually dispatched — the upload-sarif
  # step needs GitHub Advanced Security, which isn't enabled for every
  # contributor fork and produces confusing "failure" checks.
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  fs-scan:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
