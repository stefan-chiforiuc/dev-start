name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: "19 3 * * 1"
  # CodeQL uploads SARIF to GitHub Advanced Security; on repos without
  # GHAS the job ends in "failure" even when the scan itself succeeded.
  # We still run on every push to main + weekly schedule so findings get
  # surfaced; keep off PRs.
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # CodeQL uploads SARIF to GitHub Advanced Security; on repos where GHAS
    # isn't enabled the upload step fails. We want to still run the scan for
    # its log output but not block the PR on it.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [csharp, actions]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        if: matrix.language == 'csharp'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
