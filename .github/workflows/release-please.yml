name: release-please

# Stage 1 of 3 in the release pipeline. See RELEASING.md.
# This workflow only maintains the Release PR and (on merge) creates the
# tag + GitHub Release. It does NOT pack or publish.
#
# Stage 2 (release-build.yml) runs on `release: published` to attach the
# .nupkg + SBOM + provenance to the Release and smoke-install them.
# Stage 3 (release-publish.yml) is a manual workflow_dispatch that pushes
# to NuGet via OIDC trusted publishing.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5 # TODO(supply-chain): pin to commit SHA
        id: release
        with:
          release-type: simple
          package-name: dev-start

      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6 # TODO(supply-chain): pin to commit SHA

      - name: Setup .NET
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-dotnet@v5 # TODO(supply-chain): pin to commit SHA
        with:
          global-json-file: global.json

      - name: Pack global tool
        if: ${{ steps.release.outputs.release_created }}
        run: |
          dotnet pack src/DevStart.Cli/DevStart.Cli.csproj \
            --configuration Release \
            -p:Version=${{ steps.release.outputs.version }} \
            -o artifacts

      - name: Generate SBOM
        if: ${{ steps.release.outputs.release_created }}
        uses: CycloneDX/gh-dotnet-generate-sbom@v2 # TODO(supply-chain): pin to commit SHA
        with:
          path: ./DevStart.sln
          github-bearer-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@v4 # TODO(supply-chain): pin to commit SHA
        with:
          subject-path: "artifacts/*.nupkg"

      - name: Publish to NuGet
        if: ${{ steps.release.outputs.release_created }}
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
