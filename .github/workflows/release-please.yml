name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: simple
          package-name: dev-start

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Pack global tool
        run: |
          dotnet pack src/DevStart.Cli/DevStart.Cli.csproj \
            --configuration Release \
            -p:Version=${{ needs.release-please.outputs.version }} \
            -o artifacts

      - name: Generate SBOM
        uses: CycloneDX/gh-dotnet-generate-sbom@v2
        with:
          path: ./DevStart.sln
          github-bearer-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate SBOM
        id: sbom
        run: |
          path=$(find . -type f -name 'bom.xml' | head -n1)
          if [ -z "$path" ]; then
            echo "::error::SBOM (bom.xml) not found"
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "artifacts/*.nupkg"

      - name: Upload nupkg
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/*.nupkg
          retention-days: 30
          if-no-files-found: error

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ${{ steps.sbom.outputs.path }}
          retention-days: 30
          if-no-files-found: error

  verify:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download nupkg
        uses: actions/download-artifact@v7
        with:
          name: nupkg
          path: artifacts

      - name: Download SBOM
        uses: actions/download-artifact@v7
        with:
          name: sbom
          path: sbom

      - name: Trivy SBOM scan (release artifact)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom/bom.xml
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install global tool from local artifact
        run: |
          dotnet tool install --global \
            --add-source ./artifacts \
            --version ${{ needs.release-please.outputs.version }} \
            DevStart
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Verify reported version
        run: |
          installed=$(dev-start --version | tr -d '[:space:]')
          expected="${{ needs.release-please.outputs.version }}"
          if [ "$installed" != "$expected" ]; then
            echo "::error::version mismatch — expected $expected, got $installed"
            exit 1
          fi

      - name: Smoke — scaffold, build, test
        working-directory: ${{ runner.temp }}
        run: |
          dev-start new smoke-app --with postgres otel
          cd smoke-app
          dotnet build
          dotnet test --filter "Category!=Integration"

      - name: Smoke — doctor
        working-directory: ${{ runner.temp }}/smoke-app
        run: dev-start doctor

  deploy:
    needs: [release-please, build, verify]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: nuget-production
      url: https://www.nuget.org/packages/DevStart/${{ needs.release-please.outputs.version }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download nupkg
        uses: actions/download-artifact@v7
        with:
          name: nupkg
          path: artifacts

      # TODO: replace api-key auth with NuGet.org Trusted Publishing (OIDC)
      # once the trusted publisher is registered for DevStart against this
      # repo + the nuget-production environment. See RELEASING.md.
      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json
