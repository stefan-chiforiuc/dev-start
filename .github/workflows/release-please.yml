name: release-please

# Stage 1 of 3 in the release pipeline. See RELEASING.md.
# This workflow only maintains the Release PR and (on merge) creates the
# tag + GitHub Release. It does NOT pack or publish.
#
# Stage 2 (release-build.yml) runs on `release: published` to attach the
# .nupkg + SBOM + provenance to the Release and smoke-install them.
# Stage 3 (release-publish.yml) is a manual workflow_dispatch that pushes
# to NuGet via OIDC trusted publishing.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4 # TODO(supply-chain): pin to commit SHA
        with:
          release-type: simple
          package-name: dev-start
