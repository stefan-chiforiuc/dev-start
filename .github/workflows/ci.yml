name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # TODO(supply-chain): pin to commit SHA

      - name: Setup .NET
        uses: actions/setup-dotnet@v4 # TODO(supply-chain): pin to commit SHA
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --logger "GitHubActions;report-warnings=false"
          --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4 # TODO(supply-chain): pin to commit SHA
        with:
          name: test-results
          path: "**/TestResults/*.trx"

  lint-markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # TODO(supply-chain): pin to commit SHA
      - uses: DavidAnson/markdownlint-cli2-action@v16 # TODO(supply-chain): pin to commit SHA
        with:
          globs: "**/*.md"

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # TODO(supply-chain): pin to commit SHA
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2 # TODO(supply-chain): pin to commit SHA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # TODO(supply-chain): pin to commit SHA
      - name: actionlint
        uses: raven-actions/actionlint@v2 # TODO(supply-chain): pin to commit SHA
