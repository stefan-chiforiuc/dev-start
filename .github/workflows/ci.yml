name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes
        continue-on-error: true

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --logger "GitHubActions;report-warnings=false"
          --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"

  lint-markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@b4c9feab76d8025d1e83c653fa3990936df0e6c8 # v16
        with:
          # docs/history/ holds frozen retrospectives (see .markdownlintignore + ADR 0009).
          globs: |
            **/*.md
            #docs/history
            #node_modules
            #bin
            #obj

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2

  pin-check:
    # Enforces this repo's action-pinning policy on its own CI:
    #   * actions/* and github/* may use tags (first-party, trusted owner)
    #   * everything else must be pinned to a 40-char commit SHA
    # Catches Dependabot PRs that silently drop SHA pins on third-party
    # actions (e.g. release-please-action, gitleaks-action).
    #
    # Scope is intentionally .github/workflows/ only. Workflow templates
    # under capabilities/** and policies/** ship to user projects and
    # have their own pinning lifecycle.
    name: Verify action SHA pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify pins
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          violations=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            while IFS= read -r match; do
              ref="${match##*uses:}"
              ref="${ref#"${ref%%[![:space:]]*}"}"  # ltrim
              ref="${ref%%[[:space:]]*}"            # rtrim at first space
              # Skip local actions and reusable workflows in this repo
              [[ "$ref" == ./* || "$ref" == .github/* ]] && continue
              owner="${ref%%/*}"
              version="${ref##*@}"
              # First-party owners may use tags
              [[ "$owner" == "actions" || "$owner" == "github" ]] && continue
              # Everything else: must be a 40-char hex SHA
              if [[ ! "$version" =~ ^[0-9a-f]{40}$ ]]; then
                echo "::error file=$f::third-party action '$ref' is not pinned to a SHA"
                violations=$((violations + 1))
              fi
            done < <(grep -nE '^\s*-?\s*uses:\s' "$f" || true)
          done
          if (( violations > 0 )); then
            echo ""
            echo "Found $violations unpinned third-party action reference(s)."
            echo "Pin to a 40-char SHA with a trailing '# v<n>' comment, e.g."
            echo "  uses: owner/repo@1234567890abcdef1234567890abcdef12345678 # v1.2.3"
            exit 1
          fi

  pack-smoke:
    # Proves that `dotnet pack` produces a NuGet tool a user could
    # actually install and run `dev-start new` with. Runs after
    # build-test so we never pack a broken CLI.
    name: Pack + scaffold smoke
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Pack the CLI tool
        run: >
          dotnet pack src/DevStart.Cli/DevStart.Cli.csproj
          --configuration Release
          -o "$GITHUB_WORKSPACE/artifacts"

      - name: Install packed tool globally
        run: |
          dotnet tool install --global --add-source "$GITHUB_WORKSPACE/artifacts" DevStart
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Sanity-check the installed tool
        run: |
          dev-start list

      - name: Scaffold a project from the packed tool
        working-directory: ${{ runner.temp }}
        run: |
          dev-start new demo-project --no-claude --with postgres auth otel
          test -f demo-project/.devstart.json
          test -f demo-project/.devstart/baselines.json
          test -f demo-project/.mcp.json
          test -f demo-project/src/DemoProject.Api/Program.cs
          test -f demo-project/tests/DemoProject.ArchitectureTests/LayeringTests.cs

      - name: Build the scaffolded project
        working-directory: ${{ runner.temp }}/demo-project
        # Not --no-restore: a fresh clone on a developer's box starts
        # from zero. The point is to prove the .nupkg we'd ship is
        # actually runnable end-to-end.
        run: dotnet build --configuration Release
